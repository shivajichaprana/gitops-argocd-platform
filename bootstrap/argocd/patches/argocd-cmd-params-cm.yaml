apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cmd-params-cm
data:
  # TLS is terminated at the AWS ALB/NLB in front of argocd-server; the pod
  # serves HTTP. Without this the server redirects to HTTPS and health checks
  # from the load balancer fail.
  server.insecure: "true"
  # Recheck applications against Git on this interval even without webhooks.
  # Webhook delivery makes syncs near-instant; this is the safety net.
  timeout.reconciliation: "180s"
